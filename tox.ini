[tox]
envlist = py, pyqt5, pyqt6, perf
skipsdist = true

[testenv]
setenv =
    QT_QPA_PLATFORM = offscreen
    PYTHONPATH = {tox_root}
deps =
    numpy>=1.26,<3
    pytest>=8,<9
    hypothesis>=6.100,<7
commands = pytest -m "not qt and not perf" {posargs}

[testenv:pyqt5]
# One Qt binding per env so a single process never loads both.
# The app and pytest-qt bindings stay in lock-step.
setenv =
    {[testenv]setenv}
    OKLAB_QT_API = PyQt5
    PYTEST_QT_API = pyqt5
deps =
    {[testenv]deps}
    pytest-qt>=4.4,<5
    PyQt5>=5.15,<6
commands = pytest -m "qt and not perf" {posargs}

[testenv:pyqt6]
setenv =
    {[testenv]setenv}
    OKLAB_QT_API = PyQt6
    PYTEST_QT_API = pyqt6
deps =
    {[testenv]deps}
    pytest-qt>=4.4,<5
    PyQt6>=6.5,<7
commands = pytest -m "qt and not perf" {posargs}

[testenv:perf]
commands = pytest -m perf tests/perf {posargs}
