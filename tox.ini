[tox]
envlist = pyqt5, pyqt6
skipsdist = true

[testenv]
# One Qt binding per env so a single process never loads both. 
# Each env pins the app binding (OKLAB_QT_API) and pytest-qt's binding (PYTEST_QT_API) to the same value
# `tests/conftest.py` keeps them in lock-step.
setenv =
    QT_QPA_PLATFORM = offscreen
    PYTHONPATH = {tox_root}
deps =
    numpy>=1.26,<3
    pytest>=8,<9
    pytest-qt>=4.4,<5
    hypothesis>=6.100,<7
commands = pytest {posargs}

[testenv:pyqt5]
setenv =
    {[testenv]setenv}
    OKLAB_QT_API = PyQt5
    PYTEST_QT_API = pyqt5
deps =
    {[testenv]deps}
    PyQt5>=5.15,<6

[testenv:pyqt6]
setenv =
    {[testenv]setenv}
    OKLAB_QT_API = PyQt6
    PYTEST_QT_API = pyqt6
deps =
    {[testenv]deps}
    PyQt6>=6.5,<7
